<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYS://DECRYPT_MODULE</title>
    <style>
        /* Base Styles - The rest of the UI is generated via JS to hide source */
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; }
        #sec-trap { display: none; position: fixed; inset: 0; background: #000; z-index: 999999; justify-content: center; align-items: center; text-align: center; border: 5px solid red; color: red; flex-direction: column; }
        #sec-trap h1 { font-size: 3rem; text-transform: uppercase; letter-spacing: 5px; animation: glitch 0.1s infinite; }
        #app-root { display: flex; justify-content: center; align-items: center; min-height: 100%; position: relative; z-index: 2; }
        
        /* Background Grid Animation */
        .grid-bg { position: fixed; top: 0; left: 0; width: 200vw; height: 200vh; background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 30px 30px; transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px); animation: gridMove 10s linear infinite; z-index: 1; }
        @keyframes gridMove { 0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); } 100% { transform: perspective(500px) rotateX(60deg) translateY(30px) translateZ(-200px); } }
        @keyframes glitch { 0% { transform: translate(0) } 20% { transform: translate(-2px, 2px) } 40% { transform: translate(-2px, -2px) } 60% { transform: translate(2px, 2px) } 80% { transform: translate(2px, -2px) } 100% { transform: translate(0) } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes pulseShadow { 0% { box-shadow: 0 0 10px rgba(255,255,255,0.2); } 50% { box-shadow: 0 0 25px rgba(255,255,255,0.6); } 100% { box-shadow: 0 0 10px rgba(255,255,255,0.2); } }
        
        .ui-box { background: rgba(5,5,5,0.95); border: 1px solid #333; width: 95%; max-width: 480px; padding: 25px; border-radius: 4px; box-shadow: 0 0 20px rgba(255,255,255,0.1); position: relative; backdrop-filter: blur(10px); }
        .ui-header { border-bottom: 1px dashed #555; padding-bottom: 15px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .ui-header svg { width: 40px; height: 40px; fill: #fff; filter: drop-shadow(0 0 5px #fff); }
        .ui-header h1 { margin: 0; font-size: 1.4rem; letter-spacing: 2px; }
        .ui-header p { margin: 5px 0 0 0; color: #777; font-size: 0.85rem; }
        
        .btn { background: transparent; color: #fff; font-family: 'Courier New', monospace; font-size: 1.1rem; font-weight: bold; border: 1px solid #fff; padding: 15px; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 15px; }
        .btn svg { width: 20px; height: 20px; fill: currentColor; }
        .btn:hover { background: #fff; color: #000; box-shadow: 0 0 15px rgba(255,255,255,0.8); }
        .btn:active { transform: scale(0.98); }
        
        .term-log { display: none; font-size: 0.9rem; color: #aaa; min-height: 120px; border-left: 2px solid #555; padding-left: 10px; margin-top: 15px; }
        .term-line { margin-bottom: 6px; }
        .cursor { display: inline-block; width: 8px; height: 15px; background: #fff; animation: blink 1s infinite; vertical-align: middle; }
        
        .data-wrapper { display: none; position: relative; margin-top: 20px; }
        .data-content { transition: filter 0.4s ease; }
        .is-locked { filter: blur(12px) grayscale(100%); pointer-events: none; user-select: none; }
        
        .lock-screen { position: absolute; inset: -10px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); border: 1px solid #fff; z-index: 10; padding: 20px; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.9) inset; }
        .lock-screen svg { width: 50px; height: 50px; fill: #fff; margin-bottom: 15px; animation: pulseShadow 2s infinite; border-radius: 50%; }
        .lock-screen h2 { margin: 0 0 10px 0; letter-spacing: 2px; }
        .lock-screen p { color: #aaa; font-size: 0.9rem; margin-bottom: 20px; }
        #timer-box { display: none; font-size: 1.4rem; font-weight: bold; margin-top: 15px; letter-spacing: 3px; }
        
        .info-card { background: rgba(255,255,255,0.03); border: 1px solid #333; padding: 15px; margin-bottom: 15px; font-size: 0.9rem; color: #888; display: flex; align-items: center; gap: 15px; }
        .info-card span { color: #fff; font-weight: bold; }
        .info-card svg { width: 30px; height: 30px; fill: #555; }
        
        .row { display: flex; justify-content: space-between; border-bottom: 1px dashed #333; padding: 10px 0; font-size: 1.1rem; transition: 0.2s; }
        .row:hover { background: rgba(255,255,255,0.05); padding-left: 10px; }
        .r-name { color: #888; display: flex; align-items: center; gap: 8px; }
        .r-name svg { width: 16px; height: 16px; fill: #555; }
        .r-val { font-weight: bold; color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        
        .warn-box { margin-top: 20px; border-left: 3px solid #fff; padding: 10px; font-size: 0.8rem; color: #777; background: rgba(255,255,255,0.02); }
        .tg-link { display: block; text-align: center; margin-top: 20px; color: #fff; text-decoration: none; padding: 10px; border: 1px solid #333; transition: 0.3s; }
        .tg-link:hover { background: #fff; color: #000; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Grid Background -->
    <div class="grid-bg"></div>

    <!-- Security Trap Overlay -->
    <div id="sec-trap">
        <h1>SECURITY BREACH</h1>
        <p>DevTools / Source Viewer Detected.</p>
        <p>Connection Terminated.</p>
    </div>

    <!-- The actual UI will be injected here to hide HTML structure from basic source viewers -->
    <div id="app-root"></div>

    <script>
        /** ==========================================
         *  ADVANCED ANTI-INSPECT & OBFUSCATION SYSTEM
         *  ========================================== */
        
        // 1. Block Context Menu & Keys
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 67 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
                triggerTrap(); return false;
            }
        };

        // 2. DevTools Resize Detector
        window.addEventListener('resize', () => {
            if (window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) triggerTrap();
        });

        // 3. The DevTools Debugger Trap (Freezes Source Viewers)
        setInterval(function() {
            (function() { return false; }).constructor("debugger")();
        }, 50);

        function triggerTrap() {
            document.getElementById('app-root').innerHTML = ''; // Delete UI
            document.getElementById('sec-trap').style.display = 'flex';
        }

        /** ==========================================
         *  DYNAMIC DOM GENERATION (Hides HTML structure)
         *  ========================================== */
        // SVG Icons (Inline to prevent network tracking & make it standalone)
        const icn_cpu = `<svg viewBox="0 0 24 24"><path d="M20,9V7c0-1.1-0.9-2-2-2h-2V3h-2v2h-4V3H8v2H6C4.9,5,4,5.9,4,7v2H2v2h2v4H2v2h2v2c0,1.1,0.9,2,2,2h2v2h2v-2h4v2h2v-2h2c1.1,0,2-0.9,2-2v-2h2v-2h-2v-4h2V9H20z M18,19H6V7h12V19z M14,15H8v-6h6V15z"/></svg>`;
        const icn_aim = `<svg viewBox="0 0 24 24"><path d="M12,2L12,2c5.5,0,10,4.5,10,10v0c0,5.5-4.5,10-10,10h0C6.5,22,2,17.5,2,12l0,0C2,6.5,6.5,2,12,2z M12,10L12,10c-1.1,0-2,0.9-2,2v0c0,1.1,0.9,2,2,2h0c1.1,0,2-0.9,2-2v0C14,10.9,13.1,10,12,10z M12,4v2 M12,18v2 M4,12h2 M18,12h2"/></svg>`;
        const icn_yt = `<svg viewBox="0 0 24 24"><path d="M21.6,7.2C21.4,6,20.5,5,19.3,4.8C17.4,4.3,12,4.3,12,4.3s-5.4,0-7.3,0.5C3.5,5,2.6,6,2.4,7.2C2,9,2,12,2,12s0,3,0.4,4.8c0.2,1.2,1.1,2.2,2.3,2.4C6.6,19.7,12,19.7,12,19.7s5.4,0,7.3-0.5c1.2-0.2,2.1-1.2,2.3-2.4C22,15,22,12,22,12S22,9,21.6,7.2z M9.8,15.5v-7l6.3,3.5L9.8,15.5z"/></svg>`;
        const icn_lock = `<svg viewBox="0 0 24 24"><path d="M18,8h-1V6c0-2.8-2.2-5-5-5S7,3.2,7,6v2H6c-1.1,0-2,0.9-2,2v10c0,1.1,0.9,2,2,2h12c1.1,0,2-0.9,2-2V10C20,8.9,19.1,8,18,8z M9,6c0-1.7,1.3-3,3-3s3,1.3,3,3v2H9V6z M12,17c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S13.1,17,12,17z"/></svg>`;

        const uiTemplate = `
            <div class="ui-box">
                <div class="ui-header">
                    ${icn_cpu}
                    <div>
                        <h1>ROOT_ACCESS</h1>
                        <p>Hardware Calibration Protocol</p>
                    </div>
                </div>

                <button class="btn" id="btn-start" onclick="runHack()">${icn_aim} [ INJECT MODULE ]</button>

                <div class="term-log" id="term"></div>

                <div class="data-wrapper" id="wrap">
                    <div class="lock-screen" id="lock">
                        ${icn_lock}
                        <h2>[ DATA ENCRYPTED ]</h2>
                        <p>Awaiting YouTube Sub Verification...</p>
                        <button class="btn" id="btn-yt" onclick="verifySub()">${icn_yt} OPEN YOUTUBE</button>
                        <div id="timer-box">DECRYPT: <span id="time">5</span>s</div>
                    </div>

                    <div class="data-content is-locked" id="content">
                        <div class="info-card">
                            ${icn_cpu}
                            <div>
                                HW_ID: <span id="v-mod">...</span><br>
                                MATRIX: <span id="v-res">...</span>
                            </div>
                        </div>
                        <div class="row"><div class="r-name">${icn_aim} GENERAL_AXIS</div><div class="r-val" id="v-gen">--</div></div>
                        <div class="row"><div class="r-name">${icn_aim} RED_DOT_OFFSET</div><div class="r-val" id="v-red">--</div></div>
                        <div class="row"><div class="r-name">${icn_aim} 2X_MULTIPLIER</div><div class="r-val" id="v-2x">--</div></div>
                        <div class="row"><div class="r-name">${icn_aim} 4X_MULTIPLIER</div><div class="r-val" id="v-4x">--</div></div>
                        <div class="row"><div class="r-name">${icn_aim} AWM_SNIPER</div><div class="r-val" id="v-snp">--</div></div>
                        <div class="row"><div class="r-name">${icn_aim} DPI_OVERRIDE</div><div class="r-val" id="v-dpi">--</div></div>
                        <div class="row"><div class="r-name">${icn_aim} AIM_HOOK</div><div class="r-val" id="v-mod-aim">--</div></div>

                        <div class="warn-box">
                            [SYS_WARN]: Output tailored to current hardware status. Engine updates may require recalibration.
                        </div>
                        <a href="https://t.me/+7z-nwCHYdZYwZmY1" target="_blank" class="tg-link">> JOIN EXCLUSIVE TELEGRAM <</a>
                    </div>
                </div>
            </div>
        `;

        // Inject UI
        document.getElementById('app-root').innerHTML = uiTemplate;

        /** ==========================================
         *  CORE LOGIC & MATHEMATICS
         *  ========================================== */
        window.onload = () => {
            if(sessionStorage.getItem('sys_unlocked') === '1') {
                document.getElementById('btn-start').style.display = 'none';
                populateData(true);
            }
        };

        function getHWID() {
            let n = navigator.userAgent;
            let d = "UNKNOWN_SYS";
            if (/android/i.test(n)) d = (n.match(/Android.*?; (.*?) Build/) || ["", "ANDROID_SYS"])[1];
            else if (/iPad|iPhone/.test(n)) d = "IOS_SYS";
            return { m: d.toUpperCase(), r: screen.width + "x" + screen.height, hash: btoa(d + screen.width) };
        }

        function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function generateSensi() {
            return {
                g: rnd(150, 200), r: rnd(100, 200), x2: rnd(100, 200),
                x4: rnd(70, 200), s: rnd(195, 200), d: rnd(350, 500), m: Math.random()>.5?"HIGH":"DEFAULT"
            };
        }

        /** ==========================================
         *  ANIMATIONS & STATE MANAGEMENT
         *  ========================================== */
        async function runHack() {
            document.getElementById('btn-start').style.display = 'none';
            let term = document.getElementById('term');
            term.style.display = 'block';

            const cmds = [
                "> INITIALIZING MEMORY HOOK...",
                "> BYPASSING LOCAL CACHE...",
                "> SCANNING TOUCH SENSORS...",
                "> CALCULATING FLOATING OFFSETS...",
                "> ENCRYPTING OUTPUT..."
            ];

            for(let cmd of cmds) {
                term.innerHTML += `<div class="term-line">${cmd}</div>`;
                await new Promise(r => setTimeout(r, 700));
            }
            term.innerHTML += `<div class="term-line" style="color:#fff">> INJECTION COMPLETE <span class="cursor"></span></div>`;
            await new Promise(r => setTimeout(r, 1000));
            term.style.display = 'none';
            populateData(false);
        }

        function populateData(isUnlocked) {
            let hw = getHWID();
            let db = localStorage.getItem('cfg_' + hw.hash);
            let cfg = db ? JSON.parse(db) : generateSensi();
            if(!db) localStorage.setItem('cfg_' + hw.hash, JSON.stringify(cfg));

            document.getElementById('v-mod').innerText = hw.m;
            document.getElementById('v-res').innerText = hw.r;
            document.getElementById('v-gen').innerText = cfg.g;
            document.getElementById('v-red').innerText = cfg.r;
            document.getElementById('v-2x').innerText = cfg.x2;
            document.getElementById('v-4x').innerText = cfg.x4;
            document.getElementById('v-snp').innerText = cfg.s;
            document.getElementById('v-dpi').innerText = cfg.d;
            document.getElementById('v-mod-aim').innerText = cfg.m;

            document.getElementById('wrap').style.display = 'block';

            if(isUnlocked) {
                document.getElementById('lock').style.display = 'none';
                document.getElementById('content').classList.remove('is-locked');
            }
        }

        function verifySub() {
            window.open('https://youtube.com/@panelxa', '_blank');
            document.getElementById('btn-yt').style.display = 'none';
            document.getElementById('timer-box').style.display = 'block';
            
            let t = 5;
            let el = document.getElementById('time');
            let inv = setInterval(() => {
                t--; el.innerText = t;
                if(t <= 0) {
                    clearInterval(inv);
                    document.getElementById('lock').style.display = 'none';
                    document.getElementById('content').classList.remove('is-locked');
                    sessionStorage.setItem('sys_unlocked', '1');
                }
            }, 1000);
        }
    </script>
</body>
</html>
